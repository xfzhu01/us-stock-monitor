spring:
  datasource:
    url: jdbc:mysql://localhost:3366/us_monitor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

app:
  ai:
    provider: ${AI_PROVIDER:claude}
    max-tokens: 4096
    timeout-seconds: 120
    claude:
      api-key: ${CLAUDE_API_KEY:}
      api-url: https://api.anthropic.com/v1/messages
      model: claude-sonnet-4-20250514
    openai:
      api-key: ${OPENAI_API_KEY:}
      api-url: https://api.openai.com/v1/chat/completions
      model: gpt-4o
    gemini:
      api-key: ${GEMINI_API_KEY:}
      api-url: https://generativelanguage.googleapis.com/v1beta/models
      model: gemini-2.5-flash
  cors:
    allowed-origins:
      - http://localhost:3000
  crawler:
    user-agent: "Mozilla/5.0 (compatible; USMonitor/1.0)"
    timeout-ms: 10000
    retry-times: 3

logging:
  level:
    com.usmonitor: DEBUG
    org.hibernate.SQL: DEBUG
